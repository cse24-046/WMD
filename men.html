<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EVODIA | Men's Fragrances</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <header>
    <div class="logo">EVODIA</div>
    <nav>
      <a href="women.html">Women</a>
      <a href="men.html" class="active">Men</a>
      <a href="neutral.html">Neutral</a>
    </nav>
    <div class="actions">
      <select id="currencySelect">
        <option value="BWP">BWP</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
      </select>
      <select id="themeSelect">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="white">White</option>
      </select>
      <img src="assets/icons/profile.png" alt="Profile" class="profile-icon" />
    </div>
  </header>

  <main>
    <h1>Men's Perfume Brands</h1>
    <section class="brand-grid">
      <div class="brand-card" onclick="location.href='perfume.html?brand=Armani'">
        <img src="assets/images/armani.jpg" alt="Armani">
        <h2>Armani</h2>
      </div>
      <div class="brand-card" onclick="location.href='perfume.html?brand=HugoBoss'">
        <img src="assets/images/hugoboss.jpg" alt="Hugo Boss">
        <h2>Hugo Boss</h2>
      </div>
      <!-- Add more brand cards as needed -->
    </section>
  </main>

  <footer>
    <button onclick="openFeedback()">Feedback</button>
    <div class="socials">
      <a href="#"><img src="assets/icons/facebook.png" alt="Facebook"/></a>
      <a href="#"><img src="assets/icons/twitter.png" alt="Twitter"/></a>
      <a href="#"><img src="assets/icons/instagram.png" alt="Instagram"/></a>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
