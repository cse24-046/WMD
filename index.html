<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noveleer - Bookstore</title>

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="cat.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #2c2c2c;
      color: #f5f5f5;
      background-image: url('https://i.pinimg.com/736x/60/ac/a0/60aca02acc9ad62c889a1767220cc1ff.jpg');
      background-size: cover;
      background-position: center;
      backdrop-filter: blur(8px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 60px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 15px;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 10;
    }

    .logo h1 a {
      color: #fff;
      text-decoration: none;
      font-size: 32px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .cart-icon a {
      font-size: 24px;
      color: white;
    }

    nav {
      margin-top: 100px;
      background-color: rgba(0, 0, 0, 0.7);
    }

    nav ul {
      display: flex;
      justify-content: center;
      padding: 10px 0;
      list-style: none;
    }

    nav ul li {
      margin: 0 15px;
    }

    nav ul li a {
      color: #f5f5f5;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }

    nav ul li a:hover {
      color: #ff8c00;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    section {
      padding: 50px 20px;
    }

    h2 {
      color: #ff8c00;
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
    }

    .carousel-wrapper {
      overflow: hidden;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto 30px;
      border-radius: 12px;
      position: relative;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }

    .carousel-track img {
      width: 100%;
      max-width: 1000px;
      height: 300px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .popular-novels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      justify-items: center;
    }

    .novel-item {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 20px;
      text-align: center;
      border-radius: 8px;
      font-size: 18px;
      color: #f5f5f5;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: rgba(0, 0, 0, 0.8);
    }

    footer p {
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <h1><a href="index.html">NOVELEER</a></h1>
    </div>
    <div class="cart-icon">
      <a href="cart.html"><i class="fas fa-shopping-cart"></i></a>
    </div>
  </header>

  <!-- Navigation -->
  <nav>
    <ul>
      <li><a href="documetaries.html">DOCUMENTARIES</a></li>
      <li><a href="thriller.html">THRILLER</a></li>
      <li><a href="fantasy.html">FANTASY</a></li>
      <li><a href="mystery.html">MYSTERY</a></li>
      <li><a href="scifi.html">SCI-FI</a></li>
      <li><a href="selfd.html">SELF DEVELOPMENT</a></li>
      <li><a href="horror.html">HORROR</a></li>
      <li><a href="drama.html">DRAMA</a></li>
      <li><a href="romance.html">ROMANCE</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main>
    <!-- Promotions Carousel -->
    <section class="promotions">
      <h2>Promotions</h2>
      <div class="carousel-wrapper">
        <div class="carousel-track" id="promotions-track">
          <img src="book1.jpg" alt="Promo 1">
          <img src="book2.jpg" alt="Promo 2">
          <img src="book3.jpg" alt="Promo 3">
        </div>
      </div>
    </section>

    <!-- Sales Carousel -->
    <section class="sales">
      <h2>On Sale</h2>
      <div class="carousel-wrapper">
        <div class="carousel-track" id="sales-track">
          <img src="sale1.jpg" alt="Sale 1">
          <img src="sale2.jpg" alt="Sale 2">
          <img src="sale3.jpg" alt="Sale 3">
        </div>
      </div>
    </section>

    <!-- Popular Novels -->
    <section class="popular-novels">
      <h2>Popular Novels</h2>
      <div class="popular-novels-grid">
        <div class="novel-item">Novel 1</div>
        <div class="novel-item">Novel 2</div>
        <div class="novel-item">Novel 3</div>
        <div class="novel-item">Novel 4</div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Noveleer. All rights reserved.</p>
  </footer>

  <!-- Horizontal Carousel Script -->
  <script>
    function startHorizontalCarousel(trackId) {
      const track = document.getElementById(trackId);
      const slides = track.querySelectorAll('img');
      let index = 0;

      setInterval(() => {
        index = (index + 1) % slides.length;
        track.style.transform = `translateX(-${index * 100}%)`;
      }, 3000);
    }

    window.onload = () => {
      startHorizontalCarousel('promotions-track');
      startHorizontalCarousel('sales-track');
    };
  </script>

</body>
</html>
