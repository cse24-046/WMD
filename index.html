<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EVODIA - Discover Perfumes</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="profile.html"><i class="fa-solid fa-user-circle"></i></a>
    </div>
    <div class="header-center">
      <h1 class="logo">EVODIA</h1>
    </div>
    <div class="header-right">
      <select id="themeSelect" title="Theme">
        <option value="light">&#xf185; Light</option>
        <option value="dark">&#xf186; Dark</option>
      </select>
      <select id="currencySelect" title="Currency">
        <option value="BWP">BWP</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="ZAR">ZAR</option>
      </select>
    </div>
  </header>

  <section class="search-bar">
    <input type="text" id="searchInput" placeholder="Search perfumes...">
  </section>

  <main>
    <h2>Explore Brands</h2>
    <div class="brand-grid">
      <!-- 12 Brands -->
      ${[...Array(12).keys()].map(i => `
        <a href="brand${i+1}.html" class="brand-card">
          <i class="fa-solid fa-wine-bottle fa-2x"></i>
          <p>Brand ${i+1}</p>
        </a>
      `).join('')}
    </div>
  </main>

  <footer>
    <div class="social-icons">
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
    </div>
    <button onclick="location.href='feedback.html'" class="feedback-btn">Feedback</button>
  </footer>

  <script src="script.js"></script>
</body>
</html>
