<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart - Noveleer</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 15px;
      background-color: rgba(0, 0, 0, 0.6);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }

    .back-btn {
      color: #fff;
      font-size: 24px;
      text-decoration: none;
    }

    main {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 30px;
    }

    #cart-items {
      display: grid;
      grid-template-columns: auto auto auto;
      gap: 20px;
      justify-content: center;
    }

    .cart-item {
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 15px;
      position: relative;
      width: 100%;
      max-width: 300px;
    }

    .cart-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .cart-details {
      text-align: center;
    }

    .cart-details h3 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .cart-details p {
      font-size: 14px;
      color: #ccc;
    }

    .cart-price {
      font-size: 16px;
      font-weight: bold;
      color: #ff8c00;
      margin-top: 8px;
    }

    .remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: transparent;
      color: #ccc;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .remove-btn:hover { color: red; }

    .quantity-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      gap: 10px;
    }

    .quantity-controls button {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    .quantity-controls button:hover {
      background-color: #666;
    }

    .quantity {
      font-size: 16px;
      font-weight: bold;
    }

    .total-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      margin-top: 30px;
    }

    .checkout-btn {
      background-color: #444;
      color: #fff;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s;
      float: right;
      margin-top: 15px;
    }

    .checkout-btn:hover {
      background-color: #ffa733;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: rgba(0, 0, 0, 0.8);
      color: #fff;
      margin-top: 60px;
    }

    @media (max-width: 1000px) {
      #cart-items {
        grid-template-columns: auto auto auto;
      }
    }

    @media (max-width: 1000px) {
      #cart-items {
        grid-template-columns: auto auto auto;
      }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
</header>

<main>
  <h1>CART</h1>

  <div id="cart-items">
    <div class="cart-item" data-price="150">
      <img src="book1.jpg" alt="Book 1">
      <div class="cart-details">
        <h3>The Mystery of the Hidden Tomb</h3>
        <p>Thriller</p>
        <div class="quantity-controls">
          <button class="decrease">−</button>
          <span class="quantity">1</span>
          <button class="increase">+</button>
        </div>
        <div class="cart-price">P150</div>
      </div>
      <button class="remove-btn">&times;</button>
    </div>

    <div class="cart-item" data-price="120">
      <img src="book2.jpg" alt="Book 2">
      <div class="cart-details">
        <h3>Whispers of the Wind</h3>
        <p>Romance</p>
        <div class="quantity-controls">
          <button class="decrease">−</button>
          <span class="quantity">1</span>
          <button class="increase">+</button>
        </div>
        <div class="cart-price">P120</div>
      </div>
      <button class="remove-btn">&times;</button>
    </div>
  </div>

  <div class="total-box">
    <span>Total</span>
    <span id="total-price">P0</span>
  </div>

  <button class="checkout-btn">Proceed to Checkout</button>
</main>

<footer>
  <p>&copy; 2025 Noveleer. All rights reserved.</p>
</footer>

<script>
  function updateTotals() {
    let total = 0;
    document.querySelectorAll('.cart-item').forEach(item => {
      const price = parseFloat(item.getAttribute('data-price'));
      const quantity = parseInt(item.querySelector('.quantity').textContent);
      const itemTotal = price * quantity;
      item.querySelector('.cart-price').textContent = 'P' + itemTotal;
      total += itemTotal;
    });
    document.getElementById('total-price').textContent = 'P' + total;
  }

  document.addEventListener('DOMContentLoaded', () => {
    updateTotals();

    document.querySelectorAll('.increase').forEach(button => {
      button.addEventListener('click', (e) => {
        const quantityEl = e.target.previousElementSibling;
        quantityEl.textContent = parseInt(quantityEl.textContent) + 1;
        updateTotals();
      });
    });

    document.querySelectorAll('.decrease').forEach(button => {
      button.addEventListener('click', (e) => {
        const quantityEl = e.target.nextElementSibling;
        let quantity = parseInt(quantityEl.textContent);
        if (quantity > 1) {
          quantityEl.textContent = quantity - 1;
          updateTotals();
        }
      });
    });

    document.querySelectorAll('.remove-btn').forEach(button => {
      button.addEventListener('click', (e) => {
        const item = e.target.closest('.cart-item');
        item.remove();
        updateTotals();
      });
    });
  });
</script>

</body>
</html>
