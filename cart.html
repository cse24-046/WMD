<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart - Noveleer</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 15px;
      background-color: rgba(0, 0, 0, 0.6);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }

    .back-btn {
      color: #fff;
      font-size: 24px;
      text-decoration: none;
    }

    main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #ff8c00;
      margin-bottom: 10px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 10px;
      gap: 15px;
      position: relative;
    }

    .cart-item img {
      width: 80px;
      height: 120px;
      object-fit: cover;
      border-radius: 6px;
    }

    .cart-details {
      flex-grow: 1;
    }

    .cart-details h3 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .cart-details p {
      font-size: 16px;
      color: #ccc;
    }

    .cart-price {
      font-size: 18px;
      font-weight: bold;
      color: #ff8c00;
    }

    .remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: transparent;
      color: #ccc;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .remove-btn:hover {
      color: red;
    }

    .total-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
    }

    .checkout-btn {
      background-color: #ff8c00;
      color: #fff;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.3s;
    }

    .checkout-btn:hover {
      background-color: #ffa733;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: rgba(0, 0, 0, 0.8);
      color: #fff;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  </header>

  <main>
    <h1>Your Cart</h1>

    <!-- Cart Items Container -->
    <div id="cart-items">
      <div class="cart-item">
        <img src="book1.jpg" alt="Book 1">
        <div class="cart-details">
          <h3>The Mystery of the Hidden Tomb</h3>
          <p>Thriller</p>
        </div>
        <div class="cart-price" data-price="150">P150</div>
        <button class="remove-btn">&times;</button>
      </div>

      <div class="cart-item">
        <img src="book2.jpg" alt="Book 2">
        <div class="cart-details">
          <h3>Whispers of the Wind</h3>
          <p>Romance</p>
        </div>
        <div class="cart-price" data-price="120">P120</div>
        <button class="remove-btn">&times;</button>
      </div>
    </div>

    <!-- Total and Checkout -->
    <div class="total-box">
      <span>Total</span>
      <span id="total-price">P0</span>
    </div>

    <button class="checkout-btn">Proceed to Checkout</button>
  </main>

  <footer>
    <p>&copy; 2025 Noveleer. All rights reserved.</p>
  </footer>

  <!-- JS Interactivity -->
  <script>
    function updateTotal() {
      const prices = document.querySelectorAll('.cart-price');
      let total = 0;
      prices.forEach(price => {
        total += parseFloat(price.getAttribute('data-price'));
      });
      document.getElementById('total-price').textContent = 'P' + total;
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateTotal();

      document.querySelectorAll('.remove-btn').forEach(button => {
        button.addEventListener('click', (e) => {
          const item = e.target.closest('.cart-item');
          item.remove();
          updateTotal();
        });
      });
    });
  </script>

</body>
</html>
