<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVELEER - Cart</title>
  <link rel="stylesheet" href="style.css">
  <style>
    
    header .logo h1 {
      color: #e0e0e0;
      font-size: 2rem;
    }

    nav ul {
      display: flex;
      list-style: none;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1rem;
    }

    nav ul li a:hover {
      color: #f1f1f1;
    }

    main {
      padding: 40px 10%;
    }

    .cart-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      background-color: #333333;
      border-radius: 10px;
      padding: 20px;
    }

    .cart-item {
      background-color: #444444;
      padding: 15px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .cart-item img {
      width: 150px;
      height: 225px;
      object-fit: cover;
      border-radius: 5px;
    }

    .item-info h3 {
      font-size: 1.2rem;
      color: #f1f1f1;
    }

    .item-info p {
      font-size: 1rem;
    }

    .item-actions {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }

    .item-actions button {
      background-color: #555555;
      color: #f1f1f1;
      border: none;
      padding: 5px 10px;
      margin: 0 5px;
      cursor: pointer;
    }

    .item-actions button:hover {
      background-color: #666666;
    }

    .remove-btn {
      background-color: #d9534f;
    }

    .remove-btn:hover {
      background-color: #c9302c;
    }

    .cart-summary {
      margin-top: 30px;
      background-color: #444444;
      padding: 15px;
      border-radius: 10px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
    }

    .total {
      font-weight: bold;
    }

    .checkout-btn {
      width: 100%;
      padding: 15px;
      background-color: #888888;
      color: #f1f1f1;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: 20px;
    }

    .checkout-btn:hover {
      background-color: #777777;
    }

    footer {
      background-color: #111111;
      text-align: center;
      padding: 10px;
      color: #e0e0e0;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <h1>NOVELEER</h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="cart-container" id="cart-container">
      <!-- Cart items will be dynamically inserted here -->
    </div>

    <div class="cart-summary" id="cart-summary">
      <!-- Cart summary will be inserted here -->
    </div>
  </main>

  <footer>
    <p>&copy; 2025 NOVELEER. All Rights Reserved.</p>
  </footer>

  <script>
    // Function to update the cart
    function updateCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const cartContainer = document.getElementById('cart-container');
      const cartSummary = document.getElementById('cart-summary');

      // Clear the container before adding new items
      cartContainer.innerHTML = '';

      let subtotal = 0;

      // Loop through cart items and add them to the page
      cart.forEach((item, index) => {
        const cartItem = document.createElement('div');
        cartItem.classList.add('cart-item');
        cartItem.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <div class="item-info">
            <h3>${item.name}</h3>
            <p>Price: P${item.price}</p>
          </div>
          <div class="item-actions">
            <button>-</button>
            <span>1</span>
            <button>+</button>
            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
          </div>
        `;

        // Update subtotal
        subtotal += parseFloat(item.price);

        // Add item to cart container
        cartContainer.appendChild(cartItem);
      });

      // Cart summary
      cartSummary.innerHTML = `
        <div class="summary-item">
          <p>Subtotal:</p>
          <p>P${subtotal.toFixed(2)}</p>
        </div>
        <div class="summary-item">
          <p>Shipping:</p>
          <p>Free</p>
        </div>
        <div class="summary-item total">
          <p>Total:</p>
          <p>P${subtotal.toFixed(2)}</p>
        </div>
        <button class="checkout-btn">Proceed to Checkout</button>
      `;
    }

    // Function to remove an item from the cart
    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1); // Remove the item at the specified index
      localStorage.setItem('cart', JSON.stringify(cart)); // Save the updated cart
      updateCart(); // Refresh the cart display
    }

    // Initialize the cart display
    updateCart();
  </script>

</body>
</html>
