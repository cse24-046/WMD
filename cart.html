<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVELEER - Cart</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #222222;
      color: #e0e0e0;
    }

    header {
      background-color: #111111;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .logo h1 {
      color: #e0e0e0;
      font-size: 2rem;
    }

    nav ul {
      display: flex;
      list-style: none;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1rem;
    }

    nav ul li a:hover {
      color: #f1f1f1;
    }

    main {
      padding: 40px 10%;
    }

    .cart-container {
      background-color: #333333;
      border-radius: 10px;
      padding: 20px;
    }

    .cart-container h2 {
      color: #f1f1f1;
      margin-bottom: 20px;
      font-size: 2rem;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #444444;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 8px;
    }

    .cart-item img {
      width: 80px;
      height: 120px;
      object-fit: cover;
      border-radius: 5px;
    }

    .item-details {
      display: flex;
      flex-direction: column;
    }

    .item-info h3 {
      font-size: 1.2rem;
      color: #f1f1f1;
    }

    .item-info p {
      font-size: 1rem;
    }

    .item-actions {
      display: flex;
      align-items: center;
    }

    .item-actions button {
      background-color: #555555;
      color: #f1f1f1;
      border: none;
      padding: 5px 10px;
      margin: 0 5px;
      cursor: pointer;
    }

    .item-actions button:hover {
      background-color: #666666;
    }

    .remove-btn {
      background-color: #d9534f;
    }

    .remove-btn:hover {
      background-color: #c9302c;
    }

    .cart-summary {
      margin-top: 30px;
      background-color: #444444;
      padding: 15px;
      border-radius: 10px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
    }

    .total {
      font-weight: bold;
    }

    .checkout-btn {
      width: 100%;
      padding: 15px;
      background-color: #888888;
      color: #f1f1f1;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: 20px;
    }

    .checkout-btn:hover {
      background-color: #777777;
    }

    footer {
      background-color: #111111;
      text-align: center;
      padding: 10px;
      color: #e0e0e0;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <h1>NOVELEER</h1>
    </div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Shop</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">Cart</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="cart-container">
      <h2>Your Cart</h2>

      <div class="cart-item">
        <div class="item-details">
          <img src="book1.jpg" alt="Book 1">
          <div class="item-info">
            <h3>Book Title One</h3>
            <p>Author: Jane Doe</p>
            <p>Price: P19.99</p>
          </div>
        </div>
        <div class="item-actions">
          <button>-</button>
          <span>1</span>
          <button>+</button>
          <button class="remove-btn">Remove</button>
        </div>
      </div>

      <div class="cart-item">
        <div class="item-details">
          <img src="book2.jpg" alt="Book 2">
          <div class="item-info">
            <h3>Book Title Two</h3>
            <p>Author: John Smith</p>
            <p>Price: P15.99</p>
          </div>
        </div>
        <div class="item-actions">
          <button>-</button>
          <span>1</span>
          <button>+</button>
          <button class="remove-btn">Remove</button>
        </div>
      </div>

      <div class="cart-summary">
        <div class="summary-item">
          <p>Subtotal:</p>
          <p>P35.98</p>
        </div>
        <div class="summary-item">
          <p>Shipping:</p>
          <p>Free</p>
        </div>
        <div class="summary-item total">
          <p>Total:</p>
          <p>P35.98</p>
        </div>
        <button class="checkout-btn">Proceed to Checkout</button>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 NOVELEER. All Rights Reserved.</p>
  </footer>

</body>
</html>
