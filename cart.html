<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #121212;
            color: #e1e1e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #f39c12;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .container {
            padding: 20px;
        }

        .cart-list {
            list-style: none;
            padding: 0;
        }

        .cart-list li {
            background-color: #444;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .cart-list img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-info {
            flex-grow: 1;
            padding-left: 15px;
        }

        .cart-info h3 {
            font-size: 1.2em;
            color: #f39c12;
        }

        .cart-info p {
            color: #e1e1e1;
        }

        .total {
            font-size: 1.5em;
            font-weight: bold;
            color: #f39c12;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Your Cart</h1>
    </header>

    <div class="container">
        <ul class="cart-list" id="cartList">
            <!-- Cart items will be inserted dynamically -->
        </ul>

        <div class="total" id="totalAmount">
            Total: P 0.00
        </div>
    </div>

    <script>
        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartList = document.getElementById('cartList');
            const totalAmount = document.getElementById('totalAmount');

            cartList.innerHTML = ''; // Clear the cart list

            let total = 0;
            cart.forEach(item => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-info">
                        <h3>${item.name}</h3>
                        <p class="price">${item.price}</p>
                    </div>
                `;
                cartList.appendChild(listItem);

                // Convert price to number and add to total
                total += parseFloat(item.price.replace('P ', '').replace(',', ''));
            });

            // Update total price display
            totalAmount.innerText = `Total: P ${total.toFixed(2)}`;
        }

        // Call displayCart function when the page loads
        displayCart();
    </script>
</body>
</html>
