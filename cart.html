<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #121212;
            color: #e1e1e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #f39c12;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .container {
            padding: 20px;
        }

        .cart-list {
            list-style: none;
            padding: 0;
        }

        .cart-list li {
            background-color: #444;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .cart-list img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-info {
            flex-grow: 1;
            padding-left: 15px;
        }

        .cart-info h3 {
            font-size: 1.2em;
            color: #f39c12;
        }

        .cart-info p {
            color: #e1e1e1;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls button {
            background-color: #f39c12;
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .controls button:hover {
            background-color: #e67e22;
        }

        .remove-btn {
            background-color: red;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-btn:hover {
            background-color: #e74c3c;
        }

        .total {
            font-size: 1.5em;
            font-weight: bold;
            color: #f39c12;
            text-align: center;
            margin-top: 20px;
        }

        .checkout-btn {
            background-color: #27ae60;
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            display: block;
            margin: 20px auto;
        }

        .checkout-btn:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>
    <header>
        <h1>Your Cart</h1>
    </header>

    <div class="container">
        <ul class="cart-list" id="cartList">
            <!-- Cart items will be inserted dynamically -->
        </ul>

        <div class="total" id="totalAmount">
            Total: P 0.00
        </div>

        <button class="checkout-btn" id="checkoutButton">Checkout</button>
    </div>

    <script>
        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartList = document.getElementById('cartList');
            const totalAmount = document.getElementById('totalAmount');

            cartList.innerHTML = ''; // Clear the cart list

            let total = 0;
            cart.forEach((item, index) => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-info">
                        <h3>${item.name}</h3>
                        <p class="price">P ${item.price}</p>
                        <div class="controls">
                            <button class="increase-btn" onclick="updateQuantity(${index}, 1)">+</button>
                            <p>Quantity: ${item.quantity}</p>
                            <button class="decrease-btn" onclick="updateQuantity(${index}, -1)">-</button>
                            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                        </div>
                    </div>
                `;
                cartList.appendChild(listItem);

                // Convert price to number and add to total
                total += parseFloat(item.price.replace('P ', '').replace(',', '')) * item.quantity;
            });

            // Update total price display
            totalAmount.innerText = `Total: P ${total.toFixed(2)}`;
        }

        function updateQuantity(index, change) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const item = cart[index];

            item.quantity += change;
            if (item.quantity <= 0) {
                item.quantity = 1;
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart(); // Re-render the cart with updated quantity
        }

        function removeItem(index) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1); // Remove item from cart array
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart(); // Re-render the cart after removal
        }

        // Checkout button function (basic placeholder)
        document.getElementById('checkoutButton').addEventListener('click', () => {
            alert('Proceeding to checkout...');
            // You can redirect to another page or handle checkout logic here.
        });

        // Call displayCart function when the page loads
        displayCart();
    </script>
</body>
</html>
