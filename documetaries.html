<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCUMENTARIES</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        .container {
            padding: 20px;
        }
        .novel-list {
            list-style: none;
            padding: 0;
        }
        .novel-list li {
            background-color: #444;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .pagination {
            text-align: center;
            margin-top: 20px;
        }
        .pagination a {
            color: #bbb;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        .pagination a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Documentaries</h1>
    </header>
    <div class="container">
        <ul class="novel-list">
            <!-- Example novel list items (you can add more here) -->
            <li>Documentary Novel 1</li>
            <li>Documentary Novel 2</li>
            <li>Documentary Novel 3</li>
            <li>Documentary Novel 4</li>
            <!-- Add more up to 50 novels -->
        </ul>

        <!-- Pagination Section -->
        <div class="pagination">
            <a href="#">&laquo; Previous</a>
            <a href="#">Next &raquo;</a>
        </div>
    </div>
</body>
</html>
