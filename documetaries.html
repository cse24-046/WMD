<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentaries</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        nav {
            background-color: #444;
            padding: 10px;
        }
        nav ul {
            list-style: none;
            padding: 0;
            text-align: center;
        }
        nav ul li {
            display: inline;
            margin-right: 20px;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
        }
        nav ul li a:hover {
            color: #f39c12;
        }
        .container {
            padding: 20px;
        }
        .novel-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .novel-list li {
            background-color: #444;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .novel-list img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .novel-info {
            margin-top: 10px;
        }
        .novel-info h3 {
            margin: 0;
            font-size: 1.2em;
        }
        .novel-info p {
            margin: 5px 0;
            font-size: 1em;
        }
        .price {
            font-weight: bold;
            font-size: 1.1em;
            color: #f39c12;
        }
        .add-to-cart {
            background-color: #f39c12;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .add-to-cart:hover {
            background-color: #e67e22;
        }
        .pagination {
            text-align: center;
            margin-top: 20px;
        }
        .pagination a {
            color: #bbb;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        .pagination a:hover {
            color: #fff;
        }
        /* Responsive design */
        @media (max-width: 768px) {
            .novel-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .novel-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Documentaries</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
    <div class="container">
        <ul class="novel-list">
            <!-- Example documentary list items with images and prices -->
            <li>
                <img src="https://m.media-amazon.com/images/I/41TsIIX9OrL._SL500_.jpg" alt="Documentary 1">
                <div class="novel-info">
                    <h3>PLANDEMIC</h3>
                    <p class="price">P 150.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </li>
            <li>
                <img src="https://preview.redd.it/favorite-documentary-films-v0-dd0nl88857be1.jpg?width=640&crop=smart&auto=webp&s=bf95606056cf2ff84fa40f7841c6ffb36585a60e" alt="Documentary 2">
                <div class="novel-info">
                    <h3>THE ACT OF KILLING</h3>
                    <p class="price">P 200.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </li>
            <li>
                <img src="https://media.npr.org/assets/img/2022/12/12/9780525520337_custom-9d4a6e93e8334c8eb9e2386cd13020fd7530e037.jpg" alt="Documentary 3">
                <div class="novel-info">
                    <h3>A DANGEROUS BUSINESS</h3>
                    <p class="price">P 180.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </li>
            <li>
                <img src="https://m.media-amazon.com/images/I/517OzO1YNxL._SL500_.jpg" alt="Documentary 4">
                <div class="novel-info">
                    <h3>SUBJECT TO REALITY</h3>
                    <p class="price">P 220.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </li>
        </ul>

        <!-- Pagination Section -->
        <div class="pagination">
            <a href="#">« Previous</a>
            <a href="#">Next »</a>
        </div>
    </div>
</body>
</html>
