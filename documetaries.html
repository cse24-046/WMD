<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Documentaries - Noveleer</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('bookshelf-blur.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #f5f5f5;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.75);
      z-index: -1;
    }

    header {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      text-align: center;
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    nav {
      background-color: rgba(0, 0, 0, 0.7);
      padding: 10px 20px;
    }

    nav ul {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      margin-right: 10px;
    }

    .back-button {
      background-color: rgba(255, 255, 255, 0.1);
      border: none;
      padding: 10px 16px;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .back-button:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }

    .container {
      padding: 20px;
    }

    .search-box {
      text-align: center;
      margin-bottom: 30px;
    }

    .search-box input {
      padding: 10px;
      width: 50%;
      border-radius: 4px;
      border: none;
      background-color: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .search-box input::placeholder {
      color: #bbb;
    }

    .search-box button {
      padding: 10px 20px;
      background-color: #ff8c00;
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 4px;
      margin-left: 10px;
    }

    .novel-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 0;
      list-style: none;
    }

    .novel-list li {
      background-color: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      overflow: hidden;
      padding: 10px;
      text-align: center;
    }

    .novel-list img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 6px;
    }

    .novel-info h3 {
      margin: 10px 0 5px;
      font-size: 18px;
    }

    .price {
      color: #ff8c00;
      font-weight: bold;
      font-size: 16px;
    }

    .add-to-cart {
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      background-color: #ff8c00;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .pagination {
      text-align: center;
      margin-top: 30px;
    }

    .pagination a {
      margin: 0 10px;
      color: #ff8c00;
      text-decoration: none;
      font-weight: bold;
    }

    .pagination a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <header>
    Documentaries
  </header>

  <nav>
    <ul>
      <li>
        <button onclick="window.history.back();" class="back-button">
          <i class="fas fa-arrow-left"></i>
        </button>
      </li>
    </ul>
  </nav>

  <div class="container">
    <!-- Search -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search documentaries..." />
      <button onclick="searchDocumentaries()">Search</button>
    </div>

    <!-- Documentaries List -->
    <ul class="novel-list" id="novelList"></ul>

    <!-- Pagination -->
    <div class="pagination">
      <a href="#" id="prevPage" onclick="changePage(-1)">« Previous</a>
      <a href="#" id="nextPage" onclick="changePage(1)">Next »</a>
    </div>
  </div>

  <script>
      const documentaries = [
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
        { name: '', price: '', image: '' },
               ]

    let currentPage = 1;
    const itemsPerPage = 12;

    function displayDocumentaries(page) {
      const startIndex = (page - 1) * itemsPerPage;
      const endIndex = page * itemsPerPage;
      const docsToDisplay = documentaries.slice(startIndex, endIndex);
      const list = document.getElementById("novelList");

      list.innerHTML = '';

      docsToDisplay.forEach(doc => {
        const listItem = document.createElement('li');
        listItem.innerHTML = `
          <img src="${doc.image}" alt="${doc.name}">
          <div class="novel-info">
            <h3>${doc.name}</h3>
            <p class="price">${doc.price}</p>
            <button class="add-to-cart" data-name="${doc.name}" data-price="${doc.price}" data-image="${doc.image}">Add to Cart</button>
          </div>
        `;
        listItem.querySelector('.add-to-cart').addEventListener('click', addToCart);
        list.appendChild(listItem);
      });

      togglePagination();
    }

    function changePage(direction) {
      currentPage += direction;
      displayDocumentaries(currentPage);
    }

    function togglePagination() {
      const prevPageButton = document.getElementById("prevPage");
      const nextPageButton = document.getElementById("nextPage");

      prevPageButton.style.display = currentPage === 1 ? 'none' : 'inline';
      nextPageButton.style.display = currentPage * itemsPerPage < documentaries.length ? 'inline' : 'none';
    }

    function searchDocumentaries() {
      const searchQuery = document.getElementById("searchInput").value.toLowerCase();
      const filteredDocs = documentaries.filter(doc => doc.name.toLowerCase().includes(searchQuery));
      const list = document.getElementById("novelList");

      list.innerHTML = '';

      filteredDocs.forEach(doc => {
        const listItem = document.createElement('li');
        listItem.innerHTML = `
          <img src="${doc.image}" alt="${doc.name}">
          <div class="novel-info">
            <h3>${doc.name}</h3>
            <p class="price">${doc.price}</p>
            <button class="add-to-cart" data-name="${doc.name}" data-price="${doc.price}" data-image="${doc.image}">Add to Cart</button>
          </div>
        `;
        listItem.querySelector('.add-to-cart').addEventListener('click', addToCart);
        list.appendChild(listItem);
      });
    }

    function addToCart(event) {
      const button = event.target;
      const name = button.getAttribute('data-name');
      const price = button.getAttribute('data-price');
      const image = button.getAttribute('data-image');

      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.push({ name, price, image });
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(`${name} has been added to your cart!`);
    }

    displayDocumentaries(currentPage);
  </script>
</body>
</html>
