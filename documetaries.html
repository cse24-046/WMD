<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentaries</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cat.css">
</head>
<body>
    <header>
        <h1>Documentaries</h1>
    </header>

    <nav>
        <ul>
            <li><button onclick="window.history.back();" style="background-color: #444; color: white; border: none; padding: 10px 20px; cursor: pointer;">Back</button></li>
        </ul>
    </nav>

    <div class="container">
        <!-- Search Box -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search documentaries..." />
            <button onclick="searchDocumentaries()">Search</button>
        </div>

        <!-- Documentaries List -->
        <ul class="novel-list" id="novelList">
            <!-- Documentaries will be inserted dynamically -->
        </ul>

        <!-- Pagination Section -->
        <div class="pagination">
            <a href="#" id="prevPage" onclick="changePage(-1)">« Previous</a>
            <a href="#" id="nextPage" onclick="changePage(1)">Next »</a>
        </div>
    </div>

    <script>
        const documentaries = [
            { name: 'THE FLAMES OF ROME', price: 'P 150.00', image: 'https://static.tvtropes.org/pmwiki/pub/images/2688639.jpg' },
            { name: 'THE ACT OF KILLING', price: 'P 200.00', image: 'https://preview.redd.it/favorite-documentary-films-v0-dd0nl88857be1.jpg?width=640&crop=smart&auto=webp&s=bf95606056cf2ff84fa40f7841c6ffb36585a60e' },
            { name: 'A DANGEROUS BUSINESS', price: 'P 180.00', image: 'https://media.npr.org/assets/img/2022/12/12/9780525520337_custom-9d4a6e93e8334c8eb9e2386cd13020fd7530e037.jpg' },
            { name: 'SUBJECT TO REALITY', price: 'P 220.00', image: 'https://m.media-amazon.com/images/I/517OzO1YNxL._SL500_.jpg' },
            { name: 'LOVING VS VIRGINIA', price: 'P 210.00', image: 'https://cdn.amightygirl.com/catalog/product/cache/1/image/602f0fa2c1f0d1ba5e241f914e856ff9/l/o/loving_vs._virginia_update.jpg' },
            { name: 'WUHAN', price: 'P 175.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1699956368i/202113807.jpg' },
            { name: 'NO CRYSTAL STAIR', price: 'P 280.00', image: 'https://assets2.titleleaf.com/lerner/product/cover/xl_9780761361695_fc.jpg' },
            { name: 'NOTHING BUT THE TRUTH', price: 'P 300.00', image: 'https://m.media-amazon.com/images/I/71VBmwJMVjL._AC_UF1000,1000_QL80_.jpg' },
            { name: 'THE DIARY OF A YOUNG GIRL', price: 'P 350.00', image: 'https://www.amreading.com/wp-content/uploads/annefrank.jpg' },
            { name: 'SCHINDLER\'S LIST', price: 'P 220.00', image: 'https://m.media-amazon.com/images/I/81sDaNFUCkL._AC_UF1000,1000_QL80_.jpg' },
            { name: 'THE DRUGGIST OF AUSCHWITZ', price: 'P 190.00', image: 'https://img1.od-cdn.com/ImageType-100/2363-1/%7BAAA47548-46B9-4B11-BC42-8148E274FFA5%7DIMG100.JPG' },
            { name: 'THERE ARE RIVERS IN THE SKY', price: 'P 160.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1708964601i/202468422.jpg' },
            { name: 'THE MEN WHO STARE AT GOATS', price: 'P 148.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1437183381i/1824.jpg'}
               ];

        let currentPage = 1;
        const itemsPerPage = 12;

        // Function to display the documentaries
        function displayDocumentaries(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = page * itemsPerPage;
            const docsToDisplay = documentaries.slice(startIndex, endIndex);
            const list = document.getElementById("novelList");

            list.innerHTML = ''; // Clear existing list

            docsToDisplay.forEach(doc => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `
                    <img src="${doc.image}" alt="${doc.name}">
                    <div class="novel-info">
                        <h3>${doc.name}</h3>
                        <p class="price">${doc.price}</p>
                        <button class="add-to-cart" data-name="${doc.name}" data-price="${doc.price}" data-image="${doc.image}">Add to Cart</button>
                    </div>
                `;
                listItem.querySelector('.add-to-cart').addEventListener('click', addToCart);
                list.appendChild(listItem);
            });

            togglePagination();
        }

        // Function to handle previous and next page
        function changePage(direction) {
            currentPage += direction;
            displayDocumentaries(currentPage);
        }

        // Function to toggle pagination buttons visibility
        function togglePagination() {
            const prevPageButton = document.getElementById("prevPage");
            const nextPageButton = document.getElementById("nextPage");

            prevPageButton.style.display = currentPage === 1 ? 'none' : 'inline';
            nextPageButton.style.display = currentPage * itemsPerPage < documentaries.length ? 'inline' : 'none';
        }

        // Function to handle search functionality
        function searchDocumentaries() {
            const searchQuery = document.getElementById("searchInput").value.toLowerCase();
            const filteredDocs = documentaries.filter(doc => doc.name.toLowerCase().includes(searchQuery));
            const list = document.getElementById("novelList");

            list.innerHTML = ''; // Clear existing list

            filteredDocs.forEach(doc => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `
                    <img src="${doc.image}" alt="${doc.name}">
                    <div class="novel-info">
                        <h3>${doc.name}</h3>
                        <p class="price">${doc.price}</p>
                        <button class="add-to-cart" data-name="${doc.name}" data-price="${doc.price}" data-image="${doc.image}">Add to Cart</button>
                    </div>
                `;
                listItem.querySelector('.add-to-cart').addEventListener('click', addToCart);
                list.appendChild(listItem);
            });
        }

        // Function to handle the "Add to Cart" button click
        function addToCart(event) {
            const button = event.target;
            const name = button.getAttribute('data-name');
            const price = button.getAttribute('data-price');
            const image = button.getAttribute('data-image');

            // Retrieve the current cart from localStorage
            let cart = JSON.parse(localStorage.getItem('cart')) || [];

            // Add the selected documentary to the cart
            cart.push({ name, price, image });

            // Store the updated cart back into localStorage
            localStorage.setItem('cart', JSON.stringify(cart));

            // Optionally, alert the user or show a notification
            alert(`${name} has been added to your cart!`);
        }

        // Initialize the documentaries list on page load
        displayDocumentaries(currentPage);
    </script>
</body>
</html>
