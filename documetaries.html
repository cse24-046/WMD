<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCUMENTARIES</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        .container {
            padding: 20px;
        }
        .novel-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .novel-list li {
            background-color: #444;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .novel-list img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .novel-info {
            margin-top: 10px;
        }
        .novel-info h3 {
            margin: 0;
            font-size: 1.2em;
        }
        .novel-info p {
            margin: 5px 0;
            font-size: 1em;
        }
        .price {
            font-weight: bold;
            font-size: 1.1em;
            color: #f39c12;
        }
        .pagination {
            text-align: center;
            margin-top: 20px;
        }
        .pagination a {
            color: #bbb;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        .pagination a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Documentaries</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
        </ul>
    </nav>
    <div class="container">
        <ul class="novel-list">
            <!-- Example novel list items with images and prices -->
            <li>
                <img src="novel1.jpg" alt="Documentary Novel 1">
                <div class="novel-info">
                    <h3>Documentary Novel 1</h3>
                    <p class="price">P 150.00</p>
                </div>
            </li>
            <li>
                <img src="novel2.jpg" alt="Documentary Novel 2">
                <div class="novel-info">
                    <h3>Documentary Novel 2</h3>
                    <p class="price">P 200.00</p>
                </div>
            </li>
            <li>
                <img src="novel3.jpg" alt="Documentary Novel 3">
                <div class="novel-info">
                    <h3>Documentary Novel 3</h3>
                    <p class="price">P 180.00</p>
                </div>
            </li>
            <li>
                <img src="novel4.jpg" alt="Documentary Novel 4">
                <div class="novel-info">
                    <h3>Documentary Novel 4</h3>
                    <p class="price">P 220.00</p>
                </div>
            </li>
            <!-- Add more novels with images and prices -->
        </ul>

        <!-- Pagination Section -->
        <div class="pagination">
            <a href="#">&laquo; Previous</a>
            <a href="#">Next &raquo;</a>
        </div>
    </div>
</body>
</html>
