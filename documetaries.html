<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentaries</title>
    <style>
        /* Apply a blurred bookshelf background */
        body {
            background-image: url('https://images.unsplash.com/photo-1580519547241-29b97f820f94'); /* Example bookshelf image */
            background-size: cover; /* Cover the entire screen */
            background-position: center; /* Center the background */
            background-attachment: fixed; /* Make the background fixed */
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            filter: blur(5px); /* Apply a blur effect */
            position: relative;
        }

        /* Overlay effect to make the text visible */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent dark background */
        }

        header {
            background-color: rgba(51, 51, 51, 0.8); /* Dark header for contrast */
            padding: 15px;
            text-align: center;
            position: absolute;
            width: 100%;
            top: 20px;
        }
        header h1 {
            margin: 0;
        }

        nav {
            background-color: rgba(68, 68, 68, 0.8); /* Dark nav bar for contrast */
            padding: 10px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            text-align: center;
        }

        nav ul li {
            display: inline;
            margin-right: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
        }

        nav ul li a:hover {
            color: #f39c12;
        }

        .container {
            padding: 20px;
            position: relative;
            z-index: 1; /* Make sure the content is above the blurred background */
        }

        .novel-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columns */
            gap: 20px;
        }

        .novel-list li {
            background-color: #444;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 380px; /* Ensure items have consistent height */
        }

        .novel-list img {
            width: 100%;
            height: 250px; /* Ensure the images fit and do not overlap */
            object-fit: cover;
            border-radius: 5px;
        }

        .novel-info {
            margin-top: 10px;
            flex-grow: 1; /* Make sure the content grows to take up space */
        }

        .novel-info h3 {
            margin: 0;
            font-size: 1.2em;
        }

        .novel-info p {
            margin: 5px 0;
            font-size: 1em;
        }

        .price {
            font-weight: bold;
            font-size: 1.1em;
            color: #f39c12;
        }

        .add-to-cart {
            background-color: #f39c12;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .add-to-cart:hover {
            background-color: #e67e22;
        }

        .pagination {
            text-align: center;
            margin-top: 20px;
        }

        .pagination a {
            color: #bbb;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .pagination a:hover {
            color: #fff;
        }

        /* Responsive design */
        @media (max-width: 1024px) {
            .novel-list {
                grid-template-columns: repeat(3, 1fr); /* 3 columns for medium screens */
            }
        }

        @media (max-width: 768px) {
            .novel-list {
                grid-template-columns: repeat(2, 1fr); /* 2 columns for smaller screens */
            }
        }

        @media (max-width: 480px) {
            .novel-list {
                grid-template-columns: 1fr; /* 1 column for mobile screens */
            }
        }
    </style>
</head>
<body>

    <div class="overlay"></div> <!-- Overlay to make text visible -->

    <header>
        <h1>Documentaries</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
    </nav>

    <div class="container">
        <ul class="novel-list">
            <li>
                <img src="https://m.media-amazon.com/images/I/41TsIIX9OrL._SL500_.jpg" alt="Documentary 1">
                <div class="novel-info">
                    <h3>PLANDEMIC</h3>
                    <p class="price">P 150.00</p>
                    <button class="add-to-cart" data-name="PLANDEMIC" data-price="150.00" data-image="https://m.media-amazon.com/images/I/41TsIIX9OrL._SL500_.jpg">Add to Cart</button>
                </div>
            </li>
            <li>
                <img src="https://preview.redd.it/favorite-documentary-films-v0-dd0nl88857be1.jpg?width=640&crop=smart&auto=webp&s=bf95606056cf2ff84fa40f7841c6ffb36585a60e" alt="Documentary 2">
                <div class="novel-info">
                    <h3>THE ACT OF KILLING</h3>
                    <p class="price">P 200.00</p>
                    <button class="add-to-cart" data-name="THE ACT OF KILLING" data-price="200.00" data-image="https://preview.redd.it/favorite-documentary-films-v0-dd0nl88857be1.jpg?width=640&crop=smart&auto=webp&s=bf95606056cf2ff84fa40f7841c6ffb36585a60e">Add to Cart</button>
                </div>
            </li>
            <li>
                <img src="https://media.npr.org/assets/img/2022/12/12/9780525520337_custom-9d4a6e93e8334c8eb9e2386cd13020fd7530e037.jpg" alt="Documentary 3">
                <div class="novel-info">
                    <h3>A DANGEROUS BUSINESS</h3>
                    <p class="price">P 180.00</p>
                    <button class="add-to-cart" data-name="A DANGEROUS BUSINESS" data-price="180.00" data-image="https://media.npr.org/assets/img/2022/12/12/9780525520337_custom-9d4a6e93e8334c8eb9e2386cd13020fd7530e037.jpg">Add to Cart</button>
                </div>
            </li>
            <li>
                <img src="https://m.media-amazon.com/images/I/517OzO1YNxL._SL500_.jpg" alt="Documentary 4">
                <div class="novel-info">
                    <h3>SUBJECT TO REALITY</h3>
                    <p class="price">P 220.00</p>
                    <button class="add-to-cart" data-name="SUBJECT TO REALITY" data-price="220.00" data-image="https://m.media-amazon.com/images/I/517OzO1YNxL._SL500_.jpg">Add to Cart</button>
                </div>
            </li>
        </ul>

        <!-- Pagination Section -->
        <div class="pagination">
            <a href="#">« Previous</a>
            <a href="#">Next »</a>
        </div>
    </div>

    <script>
        // JavaScript to handle the "Add to Cart" button click
        document.querySelectorAll('.add-to-cart').forEach(button => {
            button.addEventListener('click', function() {
                const name = this.getAttribute('data-name');
                const price = this.getAttribute('data-price');
                const image = this.getAttribute('data-image');

                // Create an item object
                const item = {
                    name: name,
                    price: price,
                    image: image
                };

                // Get cart from localStorage, or initialize as an empty array
                let cart = JSON.parse(localStorage.getItem('cart')) || [];

                // Add the item to the cart
                cart.push(item);

                // Save the updated cart to localStorage
                localStorage.setItem('cart', JSON.stringify(cart));
                alert(name + " has been added to your cart!");
            });
        });
    </script>

</body>
</html>
