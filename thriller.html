<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thriller</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cat.css">
    <!-- Adding Font Awesome for arrow icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Thriller</h1>
    </header>

    <nav>
        <ul>
            <li><button onclick="window.history.back();" class="back-button"><i class="fas fa-arrow-left"></i></button></li>
        </ul>
    </nav>

    <div class="container">
        <!-- Search Box -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search thriller..." />
            <button onclick="searchThriller()">Search</button>
        </div>

        <!-- Thriller List -->
        <ul class="novel-list" id="novelList">
            <!-- Thriller will be inserted dynamically -->
        </ul>

        <!-- Pagination Section -->
        <div class="pagination">
            <a href="#" id="prevPage" onclick="changePage(-1)">« Previous</a>
            <a href="#" id="nextPage" onclick="changePage(1)">Next »</a>
        </div>
    </div>

    <script>
        const thriller = [
            { name: 'A STORY OF YESTERDAY', price: 'P 260.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1630609122i/58913358.jpg' },
            { name: 'GONE GIRL', price: 'P 380.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1554086139i/19288043.jpg' },
            { name: 'THE DA VINCI CODE', price: 'P 345.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1720313229i/968.jpg' },
            { name: 'ANGELS & DEMONS', price: 'P 340.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1696691404i/960.jpg' },
            { name: 'THE GIRL ON THE TRAIN', price: 'P 210.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1574805682i/22557272.jpg' },
            { name: 'SHUTTER ISLAND', price: 'P 275.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1329269081i/21686.jpg' },
            { name: 'NONE OF THIS IS TRUE', price: 'P 267.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1686092508i/62334530.jpg' },
            { name: 'THE PARIS APARTMENT', price: 'P 300.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1645550948i/58468990.jpg' },
            { name: 'YOU', price: 'P 350.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1549463282i/36430011.jpg' },
            { name: 'THE BOURNE IDENTITY', price: 'P 120.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1335860740i/7869.jpg' },
            { name: 'THE CLIENT', price: 'P 327.00', image: 'https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1554192326i/5359.jpg' },
            { name: 'INFERNO', price: 'P 340.00', image: 'https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1534070896i/17212231._SY75_.jpg' },
            { name: 'DIGITAL FORTRESS', price: 'P 340.00', image: 'https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1360095966i/11125._SY75_.jpg' }
        ];

        let currentPage = 1;
        const itemsPerPage = 12;

        // Function to display the thriller
        function displayThriller(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = page * itemsPerPage;
            const docsToDisplay = thriller.slice(startIndex, endIndex);
            const list = document.getElementById("novelList");

            list.innerHTML = ''; // Clear existing list

            docsToDisplay.forEach(doc => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `
                    <img src="${doc.image}" alt="${doc.name}">
                    <div class="novel-info">
                        <h3>${doc.name}</h3>
                        <p class="price">${doc.price}</p>
                        <button class="add-to-cart" data-name="${doc.name}" data-price="${doc.price}" data-image="${doc.image}">Add to Cart</button>
                    </div>
                `;
                listItem.querySelector('.add-to-cart').addEventListener('click', addToCart);
                list.appendChild(listItem);
            });

            togglePagination();
        }

        // Function to handle previous and next page
        function changePage(direction) {
            currentPage += direction;
            displayThriller(currentPage);
        }

        // Function to toggle pagination buttons visibility
        function togglePagination() {
            const prevPageButton = document.getElementById("prevPage");
            const nextPageButton = document.getElementById("nextPage");

            prevPageButton.style.display = currentPage === 1 ? 'none' : 'inline';
            nextPageButton.style.display = currentPage * itemsPerPage < thriller.length ? 'inline' : 'none';
        }

        // Function to handle search functionality
        function searchThriller() {
            const searchQuery = document.getElementById("searchInput").value.toLowerCase();
            const filteredDocs = thriller.filter(doc => doc.name.toLowerCase().includes(searchQuery));
            const list = document.getElementById("novelList");

            list.innerHTML = ''; // Clear existing list

            filteredDocs.forEach(doc => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `
                    <img src="${doc.image}" alt="${doc.name}">
                    <div class="novel-info">
                        <h3>${doc.name}</h3>
                        <p class="price">${doc.price}</p>
                        <button class="add-to-cart" data-name="${doc.name}" data-price="${doc.price}" data-image="${doc.image}">Add to Cart</button>
                    </div>
                `;
                listItem.querySelector('.add-to-cart').addEventListener('click', addToCart);
                list.appendChild(listItem);
            });
        }

        // Function to handle the "Add to Cart" button click
        function addToCart(event) {
            const button = event.target;
            const name = button.getAttribute('data-name');
            const price = button.getAttribute('data-price');
            const image = button.getAttribute('data-image');

            // Retrieve the current cart from localStorage
            let cart = JSON.parse(localStorage.getItem('cart')) || [];

            // Add the selected thriller to the cart
            cart.push({ name, price, image });

            // Store the updated cart back into localStorage
            localStorage.setItem('cart', JSON.stringify(cart));

            // Optionally, alert the user or show a notification
            alert(`${name} has been added to your cart!`);
        }

        // Initialize the thriller list on page load
        displayThriller(currentPage);
    </script>
</body>
</html>
