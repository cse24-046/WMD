<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVODIA - My Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="text-gray-800">
  <header class="bg-gradient-to-r from-rose-800 to-purple-900 text-white p-4 shadow-lg">
    <div class="container mx-auto flex items-center justify-center relative">
      <a href="index.html" class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center justify-center w-10 h-10 rounded-full bg-rose-700 hover:bg-rose-800 transition duration-300 ease-in-out">
        <i class="fas fa-arrow-left text-xl"></i>
      </a>
      <h1 class="text-2xl font-bold font-evodia">PROFILE</h1>
    </div>
  </header>

  <main class="container mx-auto px-4 py-8">

    <section class="profile-details bg-white p-8 rounded-xl shadow-lg border border-gray-100 mb-8">
      <div class="flex justify-center mb-6">
        <img src="https://placehold.co/100x100/be185d/ffffff?text=J" alt="Profile Icon" class="w-24 h-24 rounded-full border-4 border-rose-400 shadow-md object-cover">
      </div>

      <h3 class="text-2xl font-bold text-center text-purple-800 mb-6 border-b-2 border-rose-200 pb-3">Personal Information</h3>
      <form id="profileForm" class="space-y-6">
        <div>
          <label for="name" class="block text-gray-700 text-sm font-medium mb-2">Name:</label>
          <input type="text" id="name" name="name" value="John Doe" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-500 transition duration-200 ease-in-out">
        </div>
        <div>
          <label for="email" class="block text-gray-700 text-sm font-medium mb-2">Email:</label>
          <input type="email" id="email" name="email" value="john.doe@example.com" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-500 transition duration-200 ease-in-out">
        </div>
        <div>
          <label for="member-since" class="block text-gray-700 text-sm font-medium mb-2">Member Since:</label>
          <p id="member-since" class="text-gray-700 p-3 bg-gray-50 rounded-lg border border-gray-200">January 1, 2023</p>
        </div>
        <div class="flex justify-center pt-4">
          <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md hover:shadow-lg transition duration-300 ease-in-out transform hover:scale-105">Save Changes</button>
        </div>
      </form>
    </section>

    <section class="membership-card bg-white p-8 rounded-xl shadow-lg border border-gray-100">
      <h3 class="text-2xl font-bold text-center text-purple-800 mb-6 border-b-2 border-rose-200 pb-3">Premium Membership</h3>
      <p class="text-lg text-gray-600 text-center mb-6">Unlock unlimited access to all the base notes of every perfume!</p>
      <div class="membership-price text-5xl font-extrabold text-rose-800 text-center mb-6">BWP 150<span class="text-2xl font-normal text-gray-500">/month</span></div>
      <div class="flex justify-center">
        <button onclick="window.location.href='membership.html'" class="membership-button bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md hover:shadow-lg transition duration-300 ease-in-out transform hover:scale-105">Manage Membership</button>
      </div>
    </section>

  </main>

  <footer class="bg-rose-900 text-white py-6 shadow-inner">
    <div class="container mx-auto flex flex-col sm:flex-row items-center justify-between px-4">
      <div class="social-links flex space-x-6 mb-4 sm:mb-0 text-2xl">
        <a href="#" class="hover:text-pink-300 transition duration-300 ease-in-out" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
        <a href="#" class="hover:text-pink-300 transition duration-300 ease-in-out" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" class="hover:text-pink-300 transition duration-300 ease-in-out" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
      </div>
      <button onclick="window.location.href='feedback.html'" class="bg-rose-600 hover:bg-rose-700 text-white font-semibold py-2 px-5 rounded-md shadow-lg transition duration-300 ease-in-out transform hover:scale-105">Give Feedback</button>
    </div>
  </footer>

  <script>
    // Simple form submission handler (no actual data persistence)
    document.getElementById('profileForm').addEventListener('submit', function(event) {
      event.preventDefault(); // Prevent default form submission

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;

      // In a real application, you would send this data to a server
      console.log('Profile Updated:');
      console.log('Name:', name);
      console.log('Email:', email);

      // Display a custom message box
      const messageBox = document.createElement('div');
      messageBox.textContent = 'Profile information updated successfully!';
      messageBox.style.cssText = `
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background-color: #4CAF50; /* Green for success */
        color: white;
        padding: 15px 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.5s ease-in-out;
      `;
      document.body.appendChild(messageBox);

      setTimeout(() => {
        messageBox.style.opacity = 1;
      }, 10); // Small delay to trigger transition

      setTimeout(() => {
        messageBox.style.opacity = 0;
        messageBox.addEventListener('transitionend', () => messageBox.remove());
      }, 3000); // Hide after 3 seconds
    });
  </script>
</body>
</html>
